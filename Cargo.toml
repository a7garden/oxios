[package]
name = "oxios"
version = "0.2.0-alpha"
edition = "2021"
description = "Oxios Agent OS"
license = "MIT"

[workspace]
resolver = "2"
members = [
    "crates/oxios-kernel",
    "crates/oxios-ouroboros",
    "crates/oxios-gateway",
    "channels/oxios-web",
    "channels/oxios-cli",
    "channels/oxios-telegram",
]

[workspace.dependencies]
# Async
tokio = { version = "1", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# IDs
uuid = { version = "1", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

# Error handling
anyhow = "1"
thiserror = "1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Cryptography / hashing
sha2 = "0.10"
blake3 = "1.8"
hex = "0.4"
getrandom = "0.2"

# Concurrency
parking_lot = "0.12"

# oxi engine crates — local path for co-development
oxi-ai = { path = "../oxi/oxi-ai" }
oxi-agent = { path = "../oxi/oxi-agent" }

[features]
default = ["web", "cli", "browser"]
web = ["dep:oxios-web"]
cli = ["dep:oxios-cli"]
telegram = ["dep:oxios-telegram"]
browser = ["oxios-kernel/browser"]

[dependencies]
oxios-kernel = { path = "crates/oxios-kernel" }
oxios-ouroboros = { path = "crates/oxios-ouroboros" }
oxios-gateway = { path = "crates/oxios-gateway" }
oxios-web = { path = "channels/oxios-web", optional = true }
oxios-cli = { path = "channels/oxios-cli", optional = true }
oxios-telegram = { path = "channels/oxios-telegram", optional = true }
hex = { workspace = true }
oxi-ai = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
clap = { version = "4", features = ["derive"] }
toml = { workspace = true }
parking_lot = { workspace = true }
tracing-appender = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
oxios-ouroboros = { path = "crates/oxios-ouroboros" }
oxi-ai = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
tempfile = "3"
mockall = "0.12"
criterion = { version = "0.5", features = ["async"] }

[[bench]]
name = "kernel_bench"
harness = false
