[package]
name = "oxios"
version = "0.1.0-alpha"
edition = "2021"
description = "Oxios Agent OS"
license = "MIT"

[workspace]
resolver = "2"
members = [
    "crates/oxios-kernel",
    "crates/oxios-ouroboros",
    "crates/oxios-gateway",
    "channels/oxios-web",
]

[workspace.dependencies]
# Async
tokio = { version = "1", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# IDs
uuid = { version = "1", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Concurrency
parking_lot = "0.12"

# oxi engine crates (path dependencies to pi2oxi)
oxi-ai = { path = "../pi2oxi/oxi-ai" }
oxi-agent = { path = "../pi2oxi/oxi-agent" }

[dependencies]
oxios-kernel = { path = "crates/oxios-kernel" }
oxios-ouroboros = { path = "crates/oxios-ouroboros" }
oxios-gateway = { path = "crates/oxios-gateway" }
oxios-web = { path = "channels/oxios-web" }
oxi-ai = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
clap = { version = "4", features = ["derive"] }
toml = { workspace = true }
axum = { version = "0.8", features = ["ws"] }
tower-http = { version = "0.6", features = ["cors", "fs"] }
tokio-stream = { version = "0.1", features = ["sync"] }
