name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout oxios
        uses: actions/checkout@v4
        with:
          path: oxios

      - name: Build web assets
        working-directory: oxios/channels/oxios-web/web
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun install && bun run build

      - name: Checkout oxi
        uses: actions/checkout@v4
        with:
          repository: a7garden/oxi
          path: oxi
          ref: v0.4.4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        working-directory: oxios
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        working-directory: oxios
        run: strip target/${{ matrix.target }}/release/oxios || true

      - name: Rename binary
        working-directory: oxios
        run: mv target/${{ matrix.target }}/release/oxios target/oxios-${{ matrix.name }}

      - name: Create checksum
        working-directory: oxios
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum target/oxios-${{ matrix.name }} > target/oxios-${{ matrix.name }}.sha256
          else
            shasum -a 256 target/oxios-${{ matrix.name }} > target/oxios-${{ matrix.name }}.sha256
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            oxios/target/oxios-${{ matrix.name }}
            oxios/target/oxios-${{ matrix.name }}.sha256
          generate_release_notes: true
