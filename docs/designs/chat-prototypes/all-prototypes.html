<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oxios Chat — 4 Prototypes</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist@5.0.1/index.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.0.1/index.min.css" />
<style>
:root {
  --bg: oklch(0.99 0 0);
  --fg: oklch(0.141 0.005 285.823);
  --muted: oklch(0.967 0.001 286.375);
  --mfg: oklch(0.552 0.016 285.938);
  --border: oklch(0.92 0.004 286.32);
  --info: oklch(0.623 0.214 259.815);
  --ring: oklch(0.45 0.04 265);
  --shadow-md: 0 2px 8px oklch(0 0 0 / 0.06);
}
.dark {
  --bg: oklch(0.13 0.005 285.823);
  --fg: oklch(0.985 0 0);
  --muted: oklch(0.274 0.006 286.033);
  --mfg: oklch(0.705 0.015 286.067);
  --border: oklch(1 0 0 / 10%);
  --shadow-md: 0 2px 8px oklch(0 0 0 / 0.3);
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg); color: var(--fg);
  font-family: 'Geist', system-ui, sans-serif;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.mono { font-family: 'Geist Mono', monospace; }
/* ── Top bar ── */
.topbar {
  flex-shrink: 0; display: flex; align-items: center; gap: 4px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  background: color-mix(in oklch, var(--bg) 92%, var(--muted));
  backdrop-filter: blur(8px);
}
.brand { display: flex; align-items: center; gap: 9px; margin-right: 10px; padding-right: 14px; border-right: 1px solid var(--border); }
.brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--info); box-shadow: 0 0 8px var(--info); }
.brand .t { font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: -0.01em; }
.brand .t span { color: var(--mfg); font-weight: 400; }
.tabs { display: flex; gap: 2px; flex: 1; min-width: 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  appearance: none; border: 1px solid transparent; background: transparent;
  padding: 7px 13px; border-radius: 8px; cursor: pointer; white-space: nowrap;
  font-family: 'Geist', system-ui, sans-serif; text-align: left; color: var(--mfg);
  transition: all .18s cubic-bezier(.16,1,.3,1);
}
.tab:hover { background: var(--muted); color: var(--fg); }
.tab.active { background: var(--muted); color: var(--fg); border-color: var(--border); box-shadow: var(--shadow-md); }
.tab .id { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: .08em; display: block; color: var(--info); margin-bottom: 1px; }
.tab .lbl { font-size: 13px; font-weight: 600; display: block; }
.tab .hint { font-size: 11px; color: var(--mfg); display: block; margin-top: 1px; }
.tab.active .hint { color: var(--mfg); }
.toggle {
  flex-shrink: 0; margin-left: auto; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg);
  width: 34px; height: 34px; border-radius: 8px; color: var(--fg);
  font-size: 14px; display: inline-flex; align-items: center; justify-content: center;
}
.toggle:hover { background: var(--muted); }
/* ── Iframe stage ── */
.stage { flex: 1; min-height: 0; position: relative; background: var(--muted); }
.stage iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }
/* loading overlay */
.loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--mfg); font-family: 'Geist Mono', monospace; font-size: 12px; gap: 8px; }
.loading .spin { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--info); border-radius: 50%; animation: sp .7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <span class="t">oxios <span>· chat prototypes</span></span>
  </div>
  <div class="tabs" id="tabs"></div>
  <button class="toggle" id="theme" title="테마 전환">◐</button>
</div>
<div class="stage">
  <div class="loading" id="load"><span class="spin"></span> loading prototype…</div>
  <iframe id="frame" title="prototype"></iframe>
</div>

const TABS = [{"id":"A","file":"A-transcript.html","label":"A · Process Transcript","hint":"운영 콘솔 / 프로세스 로그"},{"id":"B","file":"B-canvas.html","label":"B · Split Canvas","hint":"대화 + 산출물 이분할"},{"id":"C","file":"C-marginalia.html","label":"C · Marginalia","hint":"중앙 본문 + 여백 메모"},{"id":"D","file":"D-stream.html","label":"D · Event Stream","hint":"수직 이벤트 스트림"}];
const tabsEl = document.getElementById('tabs');
const frame = document.getElementById('frame');
const load = document.getElementById('load');
let current = 'A';

TABS.forEach((t, i) => {
  const b = document.createElement('button');
  b.className = 'tab' + (i === 0 ? ' active' : '');
  b.dataset.id = t.id;
  b.innerHTML = '<span class="id">' + t.id + '</span><span class="lbl">' + t.label.replace(/^[A-D] · /, '') + '</span><span class="hint">' + t.hint + '</span>';
  b.onclick = () => select(t.id);
  tabsEl.appendChild(b);
});

function select(id) {
  current = id;
  [...tabsEl.children].forEach(c => c.classList.toggle('active', c.dataset.id === id));
  load.style.display = 'flex';
  frame.style.opacity = '0';
  frame.src = DATA[id];
  frame.onload = () => { load.style.display = 'none'; frame.style.opacity = '1'; };
}
frame.style.transition = 'opacity .2s';
select('A');

// theme
const html_ = document.documentElement;
const saved = localStorage.getItem('ox-proto-theme');
if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches)) html_.classList.add('dark');
document.getElementById('theme').onclick = () => {
  html_.classList.toggle('dark');
  localStorage.setItem('ox-proto-theme', html_.classList.contains('dark') ? 'dark' : 'light');
};
</script>
