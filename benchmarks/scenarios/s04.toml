[scenario]
id = "s04"
name = "멀티턴 대화"
tier = 1
difficulty = "medium"
time_limit_secs = 120
goal = "간단한 할일 관리 Rust 구조체를 만들어줘. struct Todo 형태로."

[multi_turn]
enabled = true
follow_ups = [
  "여기에 완료 상태를 토글하는 toggle() 메서드를 추가해줘",
  "이 구조체에 대한 간단한 테스트 코드도 작성해줘"
]

[evaluation]
min_expected = "첫 턴에서 Todo 구조체 생성. 두 번째 턴에서 toggle 메서드 추가. 세 번째 턴에서 테스트 코드 작성. 각 턴이 이전 컨텍스트를 유지해야 함"
quality_expected = "모든 턴이 연속성을 유지하고, 최종 결과가 컴파일 가능한 완전한 코드여야 함"
