# Tool: File creation via exec — write a file
[task]
id = "tool_file_create"
name = "File Creation via Exec"
tier = "integration"
suite = "tool"
tags = ["tool"]
timeout_secs = 30

prompt = "Create a file called bench-output.txt with the content 'benchmark-success' using a shell command."

[expect]
phase_reached = "Execute"
response_contains = ["bench-output"]
response_not_contains = ["error"]
