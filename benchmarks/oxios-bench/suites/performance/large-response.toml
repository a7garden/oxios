# Performance: Large response — handle long output
[task]
id = "perf_large_response"
name = "Large Response Handling"
tier = "e2e"
suite = "performance"
tags = ["performance"]
timeout_secs = 60

prompt = "Write the numbers from 1 to 50, one per line."

[expect]
exit_code = 0
max_duration_ms = 30_000
response_contains = ["1", "50"]
