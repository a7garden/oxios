# Performance: Tool chain — task requiring multiple tool calls
[task]
id = "perf_tool_chain"
name = "Multi-Tool Chain"
tier = "e2e"
suite = "performance"
tags = ["performance"]
timeout_secs = 120

prompt = "Create a file called chain-test.txt, write 'step1' to it, then read it back and confirm the content."

[expect]
phase_reached = "Execute"
exit_code = 0
max_duration_ms = 60_000
response_not_contains = ["error", "panic"]
