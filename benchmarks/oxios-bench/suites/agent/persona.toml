# Agent: Persona — use a specific persona
[task]
id = "agent_persona"
name = "Persona Selection"
tier = "integration"
suite = "agent"
tags = ["agent"]
timeout_secs = 30

prompt = "Switch to a helpful coding assistant persona and explain what Rust is."

[expect]
exit_code = 0
response_contains = ["Rust"]
response_not_contains = ["panic"]
