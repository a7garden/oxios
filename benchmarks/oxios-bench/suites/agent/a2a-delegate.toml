# Agent: A2A delegate — delegate a task
[task]
id = "agent_a2a_delegate"
name = "A2A Delegation"
tier = "integration"
suite = "agent"
tags = ["agent"]
timeout_secs = 60

prompt = "Delegate a math calculation to another agent: compute 256 * 256."

[expect]
exit_code = 0
response_not_contains = ["panic", "crash"]
