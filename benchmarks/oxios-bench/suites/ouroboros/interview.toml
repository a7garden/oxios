# Ouroboros: Interview phase — ambiguous prompt triggers clarification
[task]
id = "ouroboros_interview"
name = "Interview Phase Trigger"
tier = "integration"
suite = "ouroboros"
tags = ["core"]
timeout_secs = 90

prompt = "I need to organize my project, can you help?"

[expect]
# Interview may or may not trigger depending on the model's interpretation.
# At minimum, it should reach Seed phase and respond coherently.
response_not_contains = ["error", "panic", "crash"]
exit_code = 0
