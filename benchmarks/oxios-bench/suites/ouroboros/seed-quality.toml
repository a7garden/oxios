# Ouroboros: Seed quality — a coding task should produce a seed with a goal
[task]
id = "ouroboros_seed_quality"
name = "Seed Creation Quality"
tier = "integration"
suite = "ouroboros"
tags = ["core"]
timeout_secs = 60

prompt = "Write a Rust function that reverses a string."

[expect]
phase_reached = "Execute"
require_seed_id = true
response_contains = ["fn"]
