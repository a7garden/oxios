# Skill: Refactor — invoke refactor skill
[task]
id = "skill_refactor"
name = "Refactor Skill"
tier = "integration"
suite = "skill"
tags = ["skill"]
timeout_secs = 60

prompt = "Refactor this code to be more idiomatic Rust: let mut v = Vec::new(); for i in 0..10 { v.push(i); }"

[expect]
exit_code = 0
response_contains = ["collect"]
response_not_contains = ["panic"]
