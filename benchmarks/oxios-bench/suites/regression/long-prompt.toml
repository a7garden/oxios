# Regression: Very long prompt — should handle without OOM
[task]
id = "regression_long_prompt"
name = "Long Prompt Handling"
tier = "integration"
suite = "regression"
tags = ["regression"]
timeout_secs = 60

prompt = "Repeat the word 'test' exactly 10 times in a single line separated by spaces."

[expect]
exit_code = 0
response_contains = ["test"]
response_not_contains = ["panic", "oom"]
