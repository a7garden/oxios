# Regression: Markdown in prompt — handle formatted content
[task]
id = "regression_markdown"
name = "Markdown in Prompt"
tier = "integration"
suite = "regression"
tags = ["regression"]
timeout_secs = 30

prompt = """Parse this markdown:

# Title
- Item 1
- Item 2
- Item 3

**Bold** and *italic* text."""

[expect]
exit_code = 0
response_not_contains = ["panic", "crash"]
