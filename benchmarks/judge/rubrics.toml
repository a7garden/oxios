# 평가 루브릭 — Oxios Agent Experience Benchmark

## Completion (목표 달성) — 가중치 40%

사용자가 원하는 것을 실제로 얻었는가?

| 점수 | 기준 |
|------|------|
| 10 | 목표를 완벽하게 달성했으며, 요청하지 않은 추가 통찰이나 개선까지 제공함 |
| 9 | 목표 달성. 사소한 누락이나 개선 여지는 있으나 실질적으로 완료됨 |
| 8 | 목표 달성. 추가 설명이나 맥락이 부족하나 핵심은 충족됨 |
| 7 | 대부분 달성. 한두 가지 측면에서 기대에 미치지 못함 |
| 6 | 주요 부분은 달성했으나, 눈에 띄는 누락이나 오류가 있음 |
| 5 | 부분 달성. 핵심 아이디어는 있으나 실행 불가능하거나 불완전함 |
| 4 | 목표와 관련은 있으나, 실질적으로 달성하지 못함 |
| 3 | 방향은 맞으나 결과가 부정확하거나 쓸모 없음 |
| 2 | 목표와 거의 무관. 약간의 관련성만 있음 |
| 1 | 완전히 엉뚱한 방향 |
| 0 | 응답 없음, 에러, 또는 목표와 완전 무관 |

## Quality (응답 품질) — 가중치 25%

응답이 정확하고, 구조화되어 있고, 이해하기 쉬운가?

| 점수 | 기준 |
|------|------|
| 10 | 전문가 수준. 정확, 구조화, 가독성 모두 우수. 코드는 컴파일/실행 가능 |
| 9 | 매우 우수. 사소한 포맷팅이나 설명의 개선 여지만 있음 |
| 8 | 양호. 정확하고 구조는 있으나 가독성이나 완결성이 약간 부족 |
| 7 | 대체로 양호. 약간의 부정확성이나 구조적 약점 |
| 6 | 평균. 핵심 내용은 있으나 구성이 산만하거나 설명이 부족 |
| 5 | 이해 가능하나, 구조가 부족하고 설명이 불충분 |
| 4 | 부분적으로 이해 가능하나, 중요한 오류나 누락이 있음 |
| 3 | 혼란스러움. 읽기 어렵고 정보의 신뢰성이 낮음 |
| 2 | 대부분 부정확하거나 이해 불가 |
| 1 | 완전히 부정확 |
| 0 | 응답 없음 또는 의미 파악 불가 |

## Efficiency (효율성) — 가중치 15%

합리적인 시간과 단계 내에 완료되었는가?

| 점수 | 기준 |
|------|------|
| 10 | 매우 빠름. 단일 실행으로 목표 달성. 불필요한 단계 없음 |
| 9 | 빠름. 예상 범위 내에서 완료 |
| 8 | 적절함. 약간의 지연이 있으나 허용 범위 |
| 7 | 보통. 평균적인 성능 |
| 6 | 약간 느림. 최적화 여지가 있음 |
| 5 | 느림. 동일 목표에 절반 시간으로 가능할 수 있음 |
| 4 | 비효율적. 불필요한 단계가 많거나 과도한 시간 소요 |
| 3 | 매우 비효율적. 명백한 최적화 필요 |
| 2 | 극도로 비효율적. 거의 진전 없이 시간만 소모 |
| 1 | 사실상 타임아웃 직전 |
| 0 | 타임아웃 발생 또는 완전 실패 |

## Recovery (오류 대응) — 가중치 20%

문제 발생 시 적절히 대처하는가? (오류가 없으면 자동 10점)

| 점수 | 기준 |
|------|------|
| 10 | 오류 없이 정상 완료. 또는 오류 발생 후 완벽하게 자가 복구 |
| 9 | 사소한 경고는 있었으나 무시 가능. 또는 오류 후 즉시 복구 |
| 8 | 오류 발생 후 적절히 복구. 사용자 개입 약간 필요할 수 있음 |
| 7 | 오류 후 대부분 복구. 과정에서 약간의 정보 손실 |
| 6 | 오류 후 부분 복구. 핵심 기능은 되살렸으나 일부 누락 |
| 5 | 오류 후 복구 시도는 했으나 미흡 |
| 4 | 오류 발생 후 무한 루프 또는 비효율적 재시도 |
| 3 | 오류 발생 후 상황 악화 |
| 2 | 오류 발생 후 시스템 응답 불가 상태 |
| 1 | 치명적 오류로 인해 전체 실패 |
| 0 | 시스템 크래시 또는 데이터 손실
