[package]
name = "oxios-kernel"
version = "0.2.0-alpha"
edition = "2021"
description = "Oxios kernel: supervisor, event bus, state store"
license = "MIT"

[features]
default = []
otel = ["tracing-opentelemetry", "opentelemetry", "opentelemetry_sdk", "opentelemetry-otlp", "opentelemetry-stdout"]

[dependencies]
oxios-ouroboros = { path = "../oxios-ouroboros" }
oxi-ai = { workspace = true }
oxi-agent = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
cron = "0.16"

parking_lot = { workspace = true }
toml = { workspace = true }
glob = "0.3"
tempfile = "3"
# reqwest removed — unused in kernel crate
sha2 = { workspace = true }
hex = { workspace = true }
getrandom = { workspace = true }
once_cell = "1.19"
tracing-subscriber = { workspace = true }

# OpenTelemetry (optional)
tracing-opentelemetry = { version = "0.28", optional = true }
opentelemetry = { version = "0.27", optional = true }
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.27", optional = true }
opentelemetry-stdout = { version = "0.27", optional = true }

[dev-dependencies]
tempfile = "3"
oxios-ouroboros = { path = "../oxios-ouroboros" }
oxios-gateway = { path = "../oxios-gateway" }
oxi-ai = { workspace = true }
async-trait = { workspace = true }
