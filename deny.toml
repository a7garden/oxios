# cargo-deny configuration — audit F-7.
#
# Run with: `cargo deny check` (advisories, licenses, bans).
# This file is consulted by `cargo deny`; it does not replace
# `.cargo/audit.toml` (which is read by `cargo audit`).

# ─── Advisories ─────────────────────────────────────────────────
[advisories]
# Block the build on any unacknowledged vulnerability. The
# `.cargo/audit.toml` `ignore` list (read by `cargo audit`) is the
# authoritative per-advisory acknowledgement; cargo-deny uses this
# file instead and treats unknown advisories as deny.
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"

# ─── Licenses ────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "OpenSSL",
    "Unicode-2.0",
]
confidence-threshold = 0.8

# ─── Bans ───────────────────────────────────────────────────────
[bans]
# Allow duplicate versions during the workspace's consolidation
# window (audit F-7 noted 15+ crates with multiple versions); warn
# rather than deny so the build doesn't fail.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ─── Sources ────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
