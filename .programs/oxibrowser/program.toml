[program]
name = "oxibrowser"
version = "0.4.0"
description = "Embedded headless browser — oxibrowser 0.8.0 SDK"
author = "oxios"

[host_requirements]
required = []
optional = []

[tools.browse]
description = "One-shot: URL → Markdown. No session overhead."
command = "oxibrowser"
arguments = [
    { name = "url", description = "URL to browse", required = true },
]

[tools.goto]
description = "Navigate to a URL in an interactive tab"
command = "oxibrowser"
arguments = [
    { name = "url", description = "URL to navigate to", required = true },
]

[tools.back]
description = "Navigate back in history"
command = "oxibrowser"

[tools.forward]
description = "Navigate forward in history"
command = "oxibrowser"

[tools.reload]
description = "Reload the current page"
command = "oxibrowser"

[tools.click]
description = "Click an element by CSS selector"
command = "oxibrowser"
arguments = [
    { name = "selector", description = "CSS selector", required = true },
]

[tools.type_text]
description = "Type text into an element by CSS selector"
command = "oxibrowser"
arguments = [
    { name = "selector", description = "CSS selector", required = true },
    { name = "text", description = "Text to type", required = true },
]

[tools.press_key]
description = "Press a key (Enter, Tab, Escape, etc.)"
command = "oxibrowser"
arguments = [
    { name = "key", description = "Key name", required = true },
]

[tools.evaluate]
description = "Execute JavaScript"
command = "oxibrowser"
arguments = [
    { name = "javascript", description = "JS code", required = true },
]

[tools.evaluate_await]
description = "Execute JavaScript, awaiting Promise resolution"
command = "oxibrowser"
arguments = [
    { name = "javascript", description = "JS code", required = true },
]

[tools.content]
description = "Get current page content as Markdown"
command = "oxibrowser"

[tools.query_all]
description = "Get text of all elements matching a CSS selector"
command = "oxibrowser"
arguments = [
    { name = "selector", description = "CSS selector", required = true },
]

[tools.wait_for]
description = "Wait for an element to appear"
command = "oxibrowser"
arguments = [
    { name = "selector", description = "CSS selector", required = true },
    { name = "timeout_ms", description = "Timeout (ms)", required = false },
]

[tools.load_resources]
description = "Preload sub-resources (JS, CSS, images)"
command = "oxibrowser"

[tools.screenshot]
description = "Capture a PNG screenshot"
command = "oxibrowser"

[tools.close]
description = "Close the current tab"
command = "oxibrowser"
