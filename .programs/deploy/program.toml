[program]
name = "deploy"
version = "1.0.0"
description = "Safe deployment with pre-flight checks and rollback"
category = "operations"
enabled = true

[program.metadata]
icon = "🚀"
tags = ["deploy", "release", "operations"]

[program.execution]
timeout_secs = 600
requires_garden = true

[program.host_tools]
required = []
optional = ["gh", "kubectl"]

[program.tools]
- read
- bash
- grep

[program.args]
- { name = "environment", description = "Target environment (staging|production)", required = true }
- { name = "version", description = "Version or tag to deploy", required = false }

[program.dependencies]
- skill:oxios-deploy

[program.host_requirements]
tools = ["gh"]
paths = ["/Volumes/MERCURY/projects"]